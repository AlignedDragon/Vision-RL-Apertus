hydra:
  searchpath:
    - pkg://verl.trainer.config
    
defaults:
  - ppo_trainer
  - _self_

data:
  train_files: /users/msayfiddinov/capscratch/verl-apertus/data_prep/cof_rl/train.parquet
  val_files: /users/msayfiddinov/capscratch/verl-apertus/data_prep/cof_rl/val.parquet
  prompt_key: prompt
  # Apertus advertises an 8192-token context. With CoF images at 256 IBQ tokens the input
  # prompt is short (~400-550 tok), so shift the budget to the rollout RESPONSE: this lets
  # multi-turn zoom (each crop ~256 tok) use the full context instead of being truncated --
  # truncation at the old 2048-token budget was what drove RL to abandon the zoom tool.
  # Sum (2048+6000=8048) < 8192 so SGLang never gets a full/exact-context request.
  max_prompt_length: 2048
  max_response_length: 6000
  train_batch_size: 64
  return_raw_chat: true
  return_multi_modal_inputs: false
  apply_chat_template_kwargs:
    enable_thinking: true
  filter_overlong_prompts: true
  truncation: error
  custom_cls:
    path: /users/msayfiddinov/capscratch/verl-apertus/data_prep/apertus_rl_dataset.py
    name: ApertusRLHFDataset

actor_rollout_ref:
  hybrid_engine: true
  model:
    path: /capstor/store/cscs/swissai/infra01/MLLM/ablations/apertus-8b-img-SFT-32nodes-gbs512-mbs1-steps8030-img-text-seqlen8192-s2onlytxtloss/HF
    trust_remote_code: true
    enable_gradient_checkpointing: true
  actor:
    optim:
      lr: 1e-6
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 1
    fsdp_config:
      # Colocated hybrid engine: actor + sglang + VQ model share each GPU.
      # Offload optimizer states to CPU (610 GiB free) to avoid OOM as rollouts
      # lengthen (num_turns grows with zoom usage). NOT param_offload: with FSDP1
      # CPUOffload that NCCL-broadcasts CPU params at init -> ncclInvalidUsage.
      optimizer_offload: true
  rollout:
    name: sglang
    max_model_len: 8192
    # 0.35 gives sglang enough KV headroom: at 0.25 the KV pool was too small for
    # long multi-turn rollouts and tripped sglang's token_to_kv_pool leak check.
    gpu_memory_utilization: 0.35
    tensor_model_parallel_size: 2
    n: 8
    log_prob_micro_batch_size_per_gpu: 4
    agent:
      num_workers: 4
      agent_loop_config_path: /users/msayfiddinov/capscratch/verl-apertus/configs/apertus_agent_loop.yaml
    multi_turn:
      enable: true
      format: apertus
      # SFT traces have <=2 zoom crops (<=3 images), so cap assistant turns at 3
      # (<=2 zooms + final answer). At 5 the model drifted out-of-distribution to
      # ~9 turns, spamming zoom calls and exhausting KV/actor memory.
      max_assistant_turns: 3
      max_parallel_calls: 1
      max_tool_response_length: 8192
      tool_response_truncate_side: middle
      tool_config_path: /users/msayfiddinov/capscratch/verl-apertus/configs/cof_rl_tool_config.yaml
  ref:
    log_prob_micro_batch_size_per_gpu: 4
    fsdp_config:
      param_offload: true

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

reward:
  reward_manager:
    name: naive
  custom_reward_function:
    path: /users/msayfiddinov/capscratch/verl-apertus/rewards/cof_rl_reward.py
    name: compute_score

trainer:
  project_name: cof_rl_apertus
  experiment_name: apertus8b_grpo_cof_rl
  total_epochs: 5
  total_training_steps: 50   # the cof256 run's RL target (per request); raise/remove for longer RL
  n_gpus_per_node: 4
  nnodes: 1
  save_freq: 25
  test_freq: 25
  critic_warmup: 0
  logger: ["console", "wandb"]
  rollout_data_dir: /users/msayfiddinov/capscratch/verl-apertus/slurm/rollout_logs
