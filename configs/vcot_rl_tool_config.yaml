tools:
  - class_name: "tools.image_draw_bbox_tool.DrawBboxTool"
    config:
      type: native
    tool_schema:
      type: function
      function:
        name: draw_bbox_tool
        description: "Draws a rectangular bounding box on the original input image to highlight a region. Call once per region."
        parameters:
          type: object
          properties:
            bbox_2d:
              type: array
              items:
                type: number
              minItems: 4
              maxItems: 4
              description: "Box coordinates in pixels of the image as shown to you, as [x1, y1, x2, y2]: top-left and bottom-right corners. Origin (0,0) is top-left; x grows right, y grows down. Requires x1 < x2 and y1 < y2."
          required:
            - bbox_2d
  - class_name: "tools.display_answers_tool.DisplayAnswersTool"
    config:
      type: native
    tool_schema:
      type: function
      function:
        name: display_answers
        description: "Display the answers to the user."
        parameters:
          type: object
          properties:
            answers:
              type: array
              items:
                type: string
              description: "The final answers."
          required:
            - answers
