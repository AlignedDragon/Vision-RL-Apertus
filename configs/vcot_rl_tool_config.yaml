tools:
  - class_name: "tools.image_zoom_in_emu_tool.ImageZoomInEmuTool"
    config:
      type: native
      vq_model_path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/Emu3.5-VisionTokenizer
      vq_device: cuda:0
      min_dimension: 16
    tool_schema:
      type: function
      function:
        name: image_zoom_in_tool
        description: "Crops a region from the original input image and returns it as a new image for closer inspection. Use to examine small or distant details."
        parameters:
          type: object
          properties:
            bbox_2d:
              type: array
              items:
                type: number
              minItems: 4
              maxItems: 4
              description: "Crop region in absolute pixels of the original image as [x1, y1, x2, y2]: top-left and bottom-right corners. Origin (0,0) is top-left; x grows right, y grows down. Crops under ~4096 px in area are upscaled to that minimum."
          required:
            - bbox_2d
  - class_name: "tools.image_draw_bbox_tool.DrawBboxTool"
    config:
      type: native
    tool_schema:
      type: function
      function:
        name: draw_bbox_tool
        description: "Draws a rectangular bounding box on the original input image to highlight a region. Call once per region."
        parameters:
          type: object
          properties:
            bbox_2d:
              type: array
              items:
                type: number
              minItems: 4
              maxItems: 4
              description: "Box coordinates in absolute pixels of the original image as [x1, y1, x2, y2]: top-left and bottom-right corners. Origin (0,0) is top-left; x grows right, y grows down. Requires x1 < x2 and y1 < y2."
          required:
            - bbox_2d
  - class_name: "tools.display_answers_tool.DisplayAnswersTool"
    config:
      type: native
    tool_schema:
      type: function
      function:
        name: display_answers
        description: "Display the answers to the user."
        parameters:
          type: object
          properties:
            answers:
              type: array
              items:
                type: string
              description: "The final answer."
          required:
            - answers
