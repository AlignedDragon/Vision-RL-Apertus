tools:
  - class_name: "tools.image_zoom_in_emu_tool.ImageZoomInEmuTool"
    config:
      type: native
      vq_model_path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/Emu3.5-VisionTokenizer
      vq_device: cuda:0
    tool_schema:
      type: function
      function:
        name: image_zoom_in_tool
        description: "Zoom in on a region of the image by cropping it to a bounding box, for a closer look at small details at available resolution."
        parameters:
          type: object
          properties:
            bbox_2d:
              type: array
              items:
                type: number
              minItems: 4
              maxItems: 4
              description: "The region to zoom in, as [x1, y1, x2, y2]: the top-left and bottom-right corners of the bounding box."
          required:
            - bbox_2d
  - class_name: "tools.display_answers_tool.DisplayAnswersTool"
    config:
      type: native
    tool_schema:
      type: function
      function:
        name: display_answers
        description: "Display the answers to the user."
        parameters:
          type: object
          properties:
            answers:
              type: array
              items:
                type: string
              description: "The final answers."
          required:
            - answers
