model:
  # Apertus 8B SFT checkpoint (HuggingFace format)
  checkpoint: /capstor/store/cscs/swissai/infra01/MLLM/ablations/apertus-8b-img-SFT-32nodes-gbs512-mbs1-steps8030-img-text-seqlen8192-s2onlytxtloss/HF
  # Emu3.5 IBQ vision tokenizer (encodes images to discrete tokens)
  vq_model: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/Emu3.5-VisionTokenizer
  # Emu3.5 source (needed on PYTHONPATH for vision_tokenizer module)
  emu3_src: /users/msayfiddinov/capscratch/Emu3.5/src

generation:
  max_new_tokens: 256
  temperature: 0.0  # greedy decoding for reproducible evaluation

dataset:
  textvqa:
    num_samples: 200
    seed: 42
    split: validation
    eval_mode: vqa
  hrbench:
    num_samples: 200
    seed: 42
    split: hrbench_4k
    eval_mode: mcq
  vstar:
    num_samples: 191  # full dataset
    seed: 42
    split: test
    eval_mode: mcq
  pope:
    num_samples: 200
    seed: 42
    split: test
    eval_mode: binary

  vtc_bench:
    num_samples: 680
    seed: 42
    eval_mode: vtc
    tsv_path: /capstor/scratch/cscs/msayfiddinov/VTC-Bench/data/VTC-Bench.tsv

tool_agent:
  max_turns: 5
  max_new_tokens: 256
