hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

data:
  train_files: /users/msayfiddinov/capscratch/verl-apertus/data_prep/vcot_rl/train.parquet
  val_files: /users/msayfiddinov/capscratch/verl-apertus/data_prep/vcot_rl/val.parquet
  prompt_key: prompt
  # Apertus advertises an 8192-token context. Keep prompt + rollout response
  # below that limit so SGLang never receives an exact/full-context request.
  max_prompt_length: 6000
  max_response_length: 2048
  train_batch_size: 64
  return_raw_chat: true
  return_multi_modal_inputs: false
  apply_chat_template_kwargs:
    enable_thinking: true
  filter_overlong_prompts: true
  truncation: error
  custom_cls:
    path: /users/msayfiddinov/capscratch/verl-apertus/data_prep/apertus_rl_dataset.py
    name: ApertusRLHFDataset

actor_rollout_ref:
  hybrid_engine: true
  model:
    path: /capstor/store/cscs/swissai/infra01/MLLM/ablations/apertus-8b-img-SFT-32nodes-gbs512-mbs1-steps8030-img-text-seqlen8192-s2onlytxtloss/HF
    trust_remote_code: true
    enable_gradient_checkpointing: true
  actor:
    optim:
      lr: 1e-6
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 1
    fsdp_config:
      # Colocated hybrid engine: actor + sglang + VQ model share each GPU.
      # Offload optimizer states to CPU (610 GiB free) to avoid OOM. NOT
      # param_offload: with FSDP1 CPUOffload that NCCL-broadcasts CPU params at
      # init -> ncclInvalidUsage.
      optimizer_offload: true
  rollout:
    name: sglang
    max_model_len: 8192
    # 0.35 gives sglang enough KV headroom for long multi-turn rollouts.
    gpu_memory_utilization: 0.35
    tensor_model_parallel_size: 2
    n: 8
    log_prob_micro_batch_size_per_gpu: 4
    agent:
      num_workers: 4
      agent_loop_config_path: /users/msayfiddinov/capscratch/verl-apertus/configs/apertus_agent_loop.yaml
    multi_turn:
      enable: true
      format: apertus
      # VCoT is single-step grounding: the assistant draws one bbox and displays
      # the answer. The SFT target emits both calls in one assistant turn, so
      # allow 2 parallel calls; 2 turns gives headroom if the model instead does
      # draw_bbox then display_answers sequentially.
      max_assistant_turns: 2
      max_parallel_calls: 2
      max_tool_response_length: 8192
      tool_response_truncate_side: middle
      tool_config_path: /users/msayfiddinov/capscratch/verl-apertus/configs/vcot_rl_tool_config.yaml
  ref:
    log_prob_micro_batch_size_per_gpu: 4
    fsdp_config:
      param_offload: true

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

reward:
  reward_manager:
    name: naive
  custom_reward_function:
    # 0.5 * answer_match + 0.5 * IoU(pred_bbox, gold_bbox)
    path: /users/msayfiddinov/capscratch/verl-apertus/rewards/vcot_rl_reward.py
    name: compute_score

trainer:
  project_name: vcot_rl_apertus
  experiment_name: apertus8b_grpo_vcot_rl
  total_epochs: 5
  # Hard cap: stop at 500 GRPO steps regardless of epochs (5 epochs over the full
  # 194k set would be ~15k steps / weeks of compute). Run to the cap, then assess
  # plateau. Auto-resubmit (resume_mode auto) continues across the 12h wall-clock
  # until this cap.
  total_training_steps: 500
  n_gpus_per_node: 4
  nnodes: 1
  save_freq: 100
  test_freq: 50
  critic_warmup: 0
  logger: ["console", "wandb"]
  rollout_data_dir: /users/msayfiddinov/capscratch/verl-apertus/slurm/rollout_logs
