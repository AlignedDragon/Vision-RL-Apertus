defaults:
  - sft_trainer_engine
  - _self_

hydra:
  searchpath:
    - file:///users/${oc.env:USER}/capscratch/verl/verl/trainer/config

data:
  train_files:
    - /users/${oc.env:USER}/capscratch/verl-apertus/data_prep/cof_sft/train.parquet
  val_files:
    - /users/${oc.env:USER}/capscratch/verl-apertus/data_prep/cof_sft/val.parquet
  train_batch_size: 32
  micro_batch_size_per_gpu: 1
  max_length: 8192
  truncation: right
  pad_mode: no_padding
  text_key: text
  custom_cls:
    path: /users/${oc.env:USER}/capscratch/verl-apertus/data_prep/cof_sft_dataset.py
    name: CoFSFTDataset

model:
  path: /capstor/store/cscs/swissai/infra01/MLLM/ablations/apertus-8b-img-SFT-32nodes-gbs512-mbs1-steps8030-img-text-seqlen8192-s2onlytxtloss/HF
  trust_remote_code: true
  use_remove_padding: true
  enable_gradient_checkpointing: true

optim:
  lr: 1.0e-5
  lr_warmup_steps_ratio: 0.03
  weight_decay: 0.0
  clip_grad: 1.0
  lr_scheduler_type: cosine
  min_lr_ratio: 0.1

engine:
  strategy: fsdp2
  ulysses_sequence_parallel_size: 1

trainer:
  total_epochs: 1
  project_name: apertus-cof-sft
  experiment_name: apertus8b-cof-sft-bs32-lr1e-5
  default_local_dir: /capstor/scratch/cscs/${oc.env:USER}/verl-apertus/checkpoints/apertus8b-cof-sft
  logger: [console, wandb]
  save_freq: 200
  test_freq: -1
  rollout_data_dir: /users/msayfiddinov/capscratch/verl-apertus/slurm/rollout_logs