# verl-apertus conda environment (CSCS Clariden, GH200 / aarch64, CUDA 12.9)
#
#   conda env create -f environment.yml      # creates env named "verl"
#   conda activate verl
#
# IMPORTANT: this env only works *inside* the Enroot `verl_env` container
# (image.sqsh, see README "Environment setup"). It links against container
# libraries (libmpi, NCCL/libfabric) and will fail to `import torch` on a bare
# login node. torch / vllm / sglang / flash-attn wheels are the aarch64 CUDA 12.9
# builds shipped in the image — pip may not resolve identical wheels elsewhere.
#
# Versions below are the exact pins from the working env; loosen at your own risk.
name: verl
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      # --- core RL / training stack ---
      - verl==0.8.0.dev0          # use the patched fork in ../verl (@ 17ba85d2); do NOT pip-install upstream
      - torch==2.8.0              # CUDA 12.9 aarch64 build (from container)
      - vllm==0.11.1              # cu129 build
      - sglang==0.5.3.post3       # authoritative rollout/eval engine
      - ray==2.52.1
      - transformers==4.57.3
      - accelerate==1.12.0
      - peft==0.18.0
      - datasets==4.4.1
      - tensordict==0.10.0
      # --- kernels ---
      - flash-attn==2.8.3
      - flashinfer-python==0.4.1
      # --- config / utils ---
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      - codetiming==1.4.0
      - einops==0.8.1
      - numpy==1.26.4
      - pyarrow==22.0.0
      - pillow==12.0.0
      - qwen-vl-utils==0.0.14
      - wandb==0.23.1
